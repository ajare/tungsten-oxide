<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wipeout-Style Oval Track — Three.js</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 12px; left: 12px; color: #cdeeff;
    text-shadow: 0 0 6px rgba(0,180,255,0.8);
    font-size: 14px; line-height: 1.5; pointer-events: none;
    user-select: none;
  }
  #hud b { color: #fff; }
  #raceHud {
    margin-bottom: 12px; min-width: 190px; padding: 8px 10px;
    background: rgba(8,24,38,0.72); border: 1px solid #2c6a9e; border-radius: 7px;
    font-variant-numeric: tabular-nums;
  }
  #checkpointLights { display: flex; gap: 7px; min-height: 12px; margin-bottom: 7px; }
  .checkpointLight { width: 11px; height: 11px; border-radius: 50%; background: #d93636; box-shadow: 0 0 7px rgba(217,54,54,0.9); }
  .checkpointLight.hit { background: #36d96b; box-shadow: 0 0 7px rgba(54,217,107,0.95); }
  #raceHud .raceRow { display: flex; justify-content: space-between; gap: 14px; }
  #raceHud .raceValue { color: #fff; font-weight: bold; }
  #speed {
    position: absolute; bottom: 16px; right: 20px; color: #7fe7ff;
    text-shadow: 0 0 10px rgba(0,200,255,0.9);
    font-size: 34px; font-weight: bold; pointer-events: none; user-select: none;
  }
  #speed span { font-size: 14px; color: #9cd; }
  #controls {
    position: absolute; top: 12px; right: 16px; display: flex; gap: 8px;
    align-items: center; font-size: 13px; color: #cdeeff;
  }
  #controls button, #controls a {
    background: rgba(20,40,64,0.85); color: #cdeeff; border: 1px solid #2c6a9e;
    border-radius: 5px; padding: 6px 10px; font: inherit; cursor: pointer;
    text-decoration: none;
  }
  #controls button:hover, #controls a:hover { background: rgba(40,80,120,0.95); }
  #trackName { color: #7fe7ff; text-shadow: 0 0 6px rgba(0,200,255,0.7); }
  #minimap {
    position: absolute; top: 56px; right: 16px;
    width: 200px; height: 200px;
    border: 1px solid #2c6a9e; border-radius: 8px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="hud">
  <div id="raceHud">
    <div id="checkpointLights" aria-label="Current lap checkpoints"></div>
    <div class="raceRow"><span>Laps</span><span id="lapCount" class="raceValue">0</span></div>
    <div class="raceRow"><span>Lap</span><span id="lapTime" class="raceValue">00:00.000</span></div>
    <div class="raceRow"><span>Total</span><span id="totalTime" class="raceValue">00:00.000</span></div>
  </div>
  <b>Controls</b><br>
  Accelerate: W / &uarr;<br>
  Brake / Reverse: S / &darr;<br>
  Steer: A/D or &larr;/&rarr;
</div>
<div id="speed">0 <span>km/h</span></div>
<div id="controls">
  <span id="trackName"></span>
  <button id="importBtn">Import JSON</button>
  <a id="editorLink" href="editor.html" target="_blank">Open Editor</a>
  <input id="fileInput" type="file" accept="application/json,.json" hidden>
</div>
<canvas id="minimap"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- track-core.js stays a classic script: it is dependency-free and sets
     window.TrackCore before the deferred module below runs. -->
<script src="track-core.js?v=20260722d"></script>
<script type="importmap">
{ "imports": { "@willpower/geometry": "./ext/geoemetry-js/src/index.js" } }
</script>
<!-- ?v= is a cache-buster: no build step here, so browsers cache these files
     aggressively and a plain reload can silently reuse a stale copy. Bump the
     date whenever track-game.js / track-core.js change and you need a reload to
     definitely pick them up. -->
<script type="module" src="js/track-game.js?v=20260722d"></script>
</body>
</html>
