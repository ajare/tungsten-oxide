<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wipeout-Style Oval Track — Three.js</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 12px; left: 12px; color: #cdeeff;
    text-shadow: 0 0 6px rgba(0,180,255,0.8);
    font-size: 14px; line-height: 1.5; pointer-events: none;
    user-select: none;
  }
  #hud b { color: #fff; }
  #speed {
    position: absolute; bottom: 16px; right: 20px; color: #7fe7ff;
    text-shadow: 0 0 10px rgba(0,200,255,0.9);
    font-size: 34px; font-weight: bold; pointer-events: none; user-select: none;
  }
  #speed span { font-size: 14px; color: #9cd; }
  #controls {
    position: absolute; top: 12px; right: 16px; display: flex; gap: 8px;
    align-items: center; font-size: 13px; color: #cdeeff;
  }
  #controls button, #controls a {
    background: rgba(20,40,64,0.85); color: #cdeeff; border: 1px solid #2c6a9e;
    border-radius: 5px; padding: 6px 10px; font: inherit; cursor: pointer;
    text-decoration: none;
  }
  #controls button:hover, #controls a:hover { background: rgba(40,80,120,0.95); }
  #trackName { color: #7fe7ff; text-shadow: 0 0 6px rgba(0,200,255,0.7); }
</style>
</head>
<body>
<div id="hud">
  <b>Controls</b><br>
  Accelerate: W / &uarr;<br>
  Brake / Reverse: S / &darr;<br>
  Steer: A/D or &larr;/&rarr;
</div>
<div id="speed">0 <span>km/h</span></div>
<div id="controls">
  <span id="trackName"></span>
  <button id="importBtn">Import JSON</button>
  <a id="editorLink" href="editor.html" target="_blank">Open Editor</a>
  <input id="fileInput" type="file" accept="application/json,.json" hidden>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- track-core.js stays a classic script: it is dependency-free and sets
     window.TrackCore before the deferred module below runs. -->
<script src="track-core.js"></script>
<script type="importmap">
{ "imports": { "@willpower/geometry": "./ext/geoemetry-js/src/index.js" } }
</script>
<script type="module" src="js/track-game.js"></script>
</body>
</html>
